name: Deploy WebGPU client to GitHub Pages

# Builds the `app` crate to WebAssembly with Trunk and publishes it to GitHub
# Pages (same idea as the Caelum web build). Triggers on every push to any
# branch, plus manual runs. Whichever commit pushed last updates the live site.

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; newer pushes cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (wasm target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-wasm-${{ hashFiles('**/Cargo.lock') }}

      # Enables Pages via the API if it is not already on, so no manual toggle
      # is needed (requires Pages to be permitted for the repo).
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install Trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          # Pin the version: `latest` makes the action query GitHub's release
          # API, which intermittently returns an HTML error page instead of JSON
          # and fails the install ("Unexpected token '<'"). A pinned version
          # builds the download URL directly and skips that lookup.
          version: 'v0.21.0'

      - name: Build (Trunk -> dist/)
        working-directory: crates/app
        # public-url must match the project-pages path: /<repo>/
        run: trunk build --release --public-url "/${GITHUB_REPOSITORY#*/}/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: crates/app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
